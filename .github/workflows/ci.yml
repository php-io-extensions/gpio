name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: PHP ${{ matrix.php }} on Linux
    # GPIO uses <linux/gpio.h> — Linux only, no macOS.
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # linux-libc-dev ships <linux/gpio.h>; it is normally a transitive dep of
      # build-essential on Ubuntu but is explicit here for minimal runner images.
      - name: Install linux-libc-dev
        run: sudo apt-get install -y --no-install-recommends linux-libc-dev

      # ── Build ─────────────────────────────────────────────────────────────────
      # GCC 14+ (Ubuntu 24.10+) promotes -Wincompatible-pointer-types to a hard
      # error. Zephir-generated code has benign mismatches — demote to warnings.
      - name: Build extension
        working-directory: ext
        env:
          CFLAGS: >-
            ${{ env.CFLAGS }}
            -Wno-error=incompatible-pointer-types
            -Wno-error=int-conversion
            -Wno-error=implicit-function-declaration
            -Wno-error=implicit-int
        run: |
          set -euxo pipefail

          # Remove machine-specific generated artifacts accidentally committed
          # from prior local builds (e.g. stale paths in *.dep files).
          rm -rf autom4te.cache .libs modules
          rm -f Makefile Makefile.fragments config.h config.h.in config.log config.nice config.status libtool
          find . -name "*.dep" -type f -delete

          phpize
          ./configure --enable-gpio
          make -j$(nproc)

      # ── Smoke test ────────────────────────────────────────────────────────────
      - name: Smoke-test
        run: |
          php \
            -d extension=ext/modules/gpio.so \
            -r "if (!extension_loaded('gpio')) { exit(1); } echo 'gpio extension loaded OK' . PHP_EOL;"
